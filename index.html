<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethan McDonald</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;1,14..32,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #0d0d0e;
      color: #d8d8d8;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Subtle grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      width: min(900px, calc(100vw - 4rem));
      height: min(520px, calc(100vh - 4rem));
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 2.75rem 3.5rem;
      border: 1px solid #1e1e1f;
      border-left: 3px solid #b8924a;
      background: #0f0f10;
    }

    /* Corner brackets */
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
    }
    .card::before {
      top: -1px;
      left: -1px;
      border-top: 2px solid #b8924a;
      border-left: 2px solid #b8924a;
    }
    .card::after {
      bottom: -1px;
      right: -1px;
      border-bottom: 2px solid #b8924a;
      border-right: 2px solid #b8924a;
    }

    /* ── Top row ── */
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .monogram {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #b8924a;
    }

    .badge {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #606064;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .badge::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 1px;
      background: #2a2a2c;
    }

    /* ── Center ── */
    .center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
    }

    .name {
      font-size: clamp(3rem, 7.5vw, 5.25rem);
      font-weight: 300;
      letter-spacing: -0.025em;
      color: #efefef;
      line-height: 1;
      font-variant-numeric: lining-nums;
    }

    .name strong {
      font-weight: 500;
    }

    .rule {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .rule-line {
      height: 1px;
      width: 2.5rem;
      background: #b8924a;
      flex-shrink: 0;
    }

    .title {
      font-size: 0.8rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #999;
      font-weight: 400;
    }

    .specialties {
      display: flex;
      gap: 1.5rem;
      margin-top: 0.1rem;
    }

    .spec {
      font-size: 0.72rem;
      color: #6a6a6e;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 400;
      position: relative;
    }

    .spec + .spec::before {
      content: '·';
      position: absolute;
      left: -0.9rem;
      color: #2a2a2c;
    }

    /* ── Bottom row ── */
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .contacts {
      display: flex;
      gap: 2.5rem;
    }

    .contact {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .contact-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #585860;
    }

    .contact-value {
      font-size: 0.78rem;
      color: #b0b0b8;
      font-weight: 400;
      text-decoration: none;
      transition: color 0.15s ease;
      letter-spacing: 0.01em;
    }

    a.contact-value:hover {
      color: #b8924a;
    }

    .status {
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #585860;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #2d6a3f;
      box-shadow: 0 0 6px #2d6a3f88;
      flex-shrink: 0;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      html, body {
        height: 100dvh;
      }

      body {
        height: 100dvh;
      }

      .card {
        width: calc(100vw - 2rem);
        height: calc(100dvh - 2rem);
        padding: 1.75rem 1.75rem;
      }

      .badge::before {
        display: none;
      }

      .name {
        font-size: clamp(2.25rem, 11vw, 3rem);
      }

      .rule {
        margin: 1.1rem 0;
      }

      .specialties {
        flex-direction: column;
        gap: 0.55rem;
        margin-top: 0.2rem;
      }

      .spec {
        font-size: 0.68rem;
        color: #6a6a6e;
      }

      .spec + .spec::before {
        display: none;
      }

      .bottom {
        flex-direction: column;
        align-items: flex-start;
        gap: 1.25rem;
      }

      .contacts {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem 1.5rem;
        width: 100%;
      }

      .contact-value {
        font-size: 0.72rem;
      }

      .status {
        color: #585860;
      }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="top">
      <span class="monogram">E · J · M</span>
      <span class="badge">Tax Professional</span>
    </div>

    <div class="center">
      <h1 class="name"><strong>Ethan J.</strong> McDonald</h1>
      <div class="rule">
        <div class="rule-line"></div>
        <span class="title">Bianchi and McDonald, LLC</span>
      </div>
      <div class="specialties">
        <span class="spec">Individual Return<br>Preparation</span>
        <span class="spec">Future<br>Planning</span>
        <span class="spec">Estimated<br>Calculations</span>
        <span class="spec">IRS &amp; NYS<br>Compliance</span>
      </div>
    </div>

    <div class="bottom">
      <div class="contacts">
        <div class="contact">
          <span class="contact-label">Email</span>
          <a href="mailto:ethan@bianchiandmcdonald.com" class="contact-value">ethan@bianchiandmcdonald.com</a>
        </div>
        <div class="contact">
          <span class="contact-label">Phone</span>
          <span class="contact-value">518-355-2394</span>
        </div>
        <div class="contact">
          <span class="contact-label">Website</span>
          <a href="https://www.bianchiandmcdonald.com" class="contact-value">bianchiandmcdonald.com</a>
        </div>
        <div class="contact">
          <span class="contact-label">Location</span>
          <span class="contact-value">Schenectady, NY</span>
        </div>
      </div>
      <div class="status">
        <div class="status-dot"></div>
        Available
      </div>
    </div>

  </div>
</body>
</html>
